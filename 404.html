<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | BitCal</title>
    <meta name="description" content="The page you're looking for does not exist.">
    <meta name="robots" content="noindex, nofollow">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="docs/assets/styles.css">
    <style>
        .error-page {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
            background: var(--bg-primary);
        }
        .error-code {
            font-size: 8rem;
            font-weight: 800;
            color: var(--accent-primary);
            line-height: 1;
            margin-bottom: 1rem;
            opacity: 0.8;
        }
        .error-title {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: var(--text-primary);
        }
        .error-message {
            color: var(--text-secondary);
            margin-bottom: 2rem;
            max-width: 400px;
        }
        .error-actions {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            justify-content: center;
        }
        .logo-top {
            position: absolute;
            top: 1.5rem;
            left: 1.5rem;
        }
    </style>
</head>
<body>
    <a href="./" class="logo logo-top">
        <div class="logo-icon"><i class="fas fa-microchip"></i></div>
        <span>BitCal</span>
    </a>

    <div class="error-page">
        <div class="error-code">404</div>
        <h1 class="error-title">Page Not Found</h1>
        <p class="error-message">
            The page you're looking for may have been moved, deleted, or does not exist.
        </p>
        <div class="error-actions">
            <a href="./" class="btn btn-primary">
                <i class="fas fa-home"></i> Go Home
            </a>
            <a href="./docs/" class="btn btn-secondary">
                <i class="fas fa-book"></i> Documentation
            </a>
            <a href="https://github.com/LessUp/bitcal" class="btn btn-secondary" target="_blank">
                <i class="fab fa-github"></i> GitHub
            </a>
        </div>
    </div>

    <script src="docs/assets/scripts.js"></script>
</body>
</html>
