name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Publish header-only release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Package release artifacts
        run: |
          TAG="${GITHUB_REF_NAME}"
          PKG="bitcal-${TAG}"
          mkdir -p "dist/${PKG}/include"
          cp -r include/bitcal "dist/${PKG}/include/"
          cp LICENSE README.md README.zh-CN.md CHANGELOG.md CHANGELOG.zh-CN.md CMakeLists.txt "dist/${PKG}/"
          cp -r cmake "dist/${PKG}/"
          (cd dist && zip -r "${PKG}.zip" "${PKG}" >/dev/null)
          (cd dist && tar czf "${PKG}.tar.gz" "${PKG}")

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.zip
            dist/*.tar.gz
          body: |
            ## BitCal ${{ github.ref_name }}

            BitCal is a header-only C++17 library. This release publishes the canonical source bundle only:

            - `bitcal-${{ github.ref_name }}.zip`
            - `bitcal-${{ github.ref_name }}.tar.gz`

            Included contents:

            - `include/bitcal/`
            - `cmake/`
            - `CMakeLists.txt`
            - License, README, and changelog files

            Validation is handled by the retained CI workflow. No platform-specific binary archives are produced.
