name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          release_name: BitCal ${{ github.ref_name }}
          body: |
            ## BitCal ${{ github.ref_name }}

            ### 安装

            BitCal 是 header-only 库，下载对应平台的压缩包后，将 `include/bitcal/` 目录复制到你的项目中即可。

            ```cpp
            #include <bitcal/bitcal.hpp>
            ```

            ### 平台包说明

            | 包名 | 平台 | 说明 |
            |------|------|------|
            | `bitcal-*-headers.zip` | 全平台 | 仅头文件（推荐） |
            | `bitcal-*-linux-x64.tar.gz` | Linux x64 | 含头文件 + 编译好的测试和示例 |
            | `bitcal-*-linux-arm64.tar.gz` | Linux ARM64 | 含头文件（交叉编译构建验证通过） |
            | `bitcal-*-windows-x64.zip` | Windows x64 | 含头文件 + 编译好的测试和示例 |
            | `bitcal-*-macos-x64.tar.gz` | macOS x64 | 含头文件 + 编译好的测试和示例 |
            | `bitcal-*-macos-arm64.tar.gz` | macOS ARM64 | 含头文件 + 编译好的测试和示例 |
          draft: false
          prerelease: false

  # Header-only package (platform-independent)
  package-headers:
    name: Package Headers
    needs: create-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Package
        run: |
          mkdir -p bitcal-${{ github.ref_name }}-headers/include
          cp -r include/bitcal bitcal-${{ github.ref_name }}-headers/include/
          cp LICENSE README.md bitcal-${{ github.ref_name }}-headers/
          cp -r cmake bitcal-${{ github.ref_name }}-headers/
          cp CMakeLists.txt bitcal-${{ github.ref_name }}-headers/
          zip -r bitcal-${{ github.ref_name }}-headers.zip bitcal-${{ github.ref_name }}-headers/

      - name: Upload
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: bitcal-${{ github.ref_name }}-headers.zip
          asset_name: bitcal-${{ github.ref_name }}-headers.zip
          asset_content_type: application/zip

  # Platform-specific packages
  package-platform:
    needs: create-release
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            name: linux-x64
            ext: tar.gz
            cmake_extra: ""

          - os: windows-latest
            name: windows-x64
            ext: zip
            cmake_extra: ""

          - os: macos-13
            name: macos-x64
            ext: tar.gz
            cmake_extra: ""

          - os: macos-latest
            name: macos-arm64
            ext: tar.gz
            cmake_extra: ""

    name: Package ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DBITCAL_NATIVE_ARCH=ON ${{ matrix.cmake_extra }}
          cmake --build build --config Release

      - name: Test
        run: ctest --test-dir build --output-on-failure -C Release

      - name: Package (Unix)
        if: matrix.ext == 'tar.gz'
        run: |
          PKG=bitcal-${{ github.ref_name }}-${{ matrix.name }}
          mkdir -p $PKG/include $PKG/bin
          cp -r include/bitcal $PKG/include/
          cp LICENSE README.md $PKG/
          find build -name "test_bitcal" -o -name "basic_usage" -o -name "performance_comparison" | head -3 | xargs -I{} cp {} $PKG/bin/ 2>/dev/null || true
          tar czf $PKG.tar.gz $PKG/

      - name: Package (Windows)
        if: matrix.ext == 'zip'
        shell: pwsh
        run: |
          $PKG = "bitcal-${{ github.ref_name }}-${{ matrix.name }}"
          New-Item -ItemType Directory -Path "$PKG/include", "$PKG/bin" -Force
          Copy-Item -Recurse include/bitcal "$PKG/include/"
          Copy-Item LICENSE, README.md "$PKG/"
          Get-ChildItem build -Recurse -Include "test_bitcal.exe","basic_usage.exe","performance_comparison.exe" | Copy-Item -Destination "$PKG/bin/" -ErrorAction SilentlyContinue
          Compress-Archive -Path "$PKG" -DestinationPath "$PKG.zip"

      - name: Upload
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: bitcal-${{ github.ref_name }}-${{ matrix.name }}.${{ matrix.ext }}
          asset_name: bitcal-${{ github.ref_name }}-${{ matrix.name }}.${{ matrix.ext }}
          asset_content_type: ${{ matrix.ext == 'zip' && 'application/zip' || 'application/gzip' }}
