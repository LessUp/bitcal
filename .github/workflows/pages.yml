name: Deploy to GitHub Pages

on:
  push:
    branches: [master, main]
    paths:
      - "index.html"
      - "404.html"
      - "docs/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        
      - name: Setup Pages
        uses: actions/configure-pages@v5
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: npm install -g marked highlight.js
      
      - name: Build Site Structure
        run: |
          mkdir -p _site
          touch _site/.nojekyll

          cp index.html _site/
          cp 404.html _site/
          cp -r docs _site/

          HTML_TEMPLATE='<!DOCTYPE html>
          <html lang="LANG" data-theme="dark">
          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <title>TITLE | BitCal</title>
              <link rel="preconnect" href="https://fonts.googleapis.com">
              <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
              <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
              <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
              <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
              <style>
                  :root {
                      --bg-primary: #0a0a0f;
                      --bg-secondary: #12121a;
                      --bg-tertiary: #1a1a25;
                      --text-primary: #e6e6e6;
                      --text-secondary: #a0a0b0;
                      --text-muted: #6a6a7a;
                      --accent-primary: #00d4ff;
                      --accent-secondary: #ff006e;
                      --border-color: rgba(255,255,255,0.1);
                  }
                  [data-theme="light"] {
                      --bg-primary: #ffffff;
                      --bg-secondary: #f8f9fa;
                      --bg-tertiary: #e9ecef;
                      --text-primary: #1a1a2e;
                      --text-secondary: #4a4a6a;
                      --text-muted: #8a8a9a;
                      --accent-primary: #0066cc;
                      --border-color: rgba(0,0,0,0.08);
                  }
                  * { margin: 0; padding: 0; box-sizing: border-box; }
                  body {
                      font-family: "Inter", sans-serif;
                      background: var(--bg-primary);
                      color: var(--text-primary);
                      line-height: 1.7;
                  }
                  .header {
                      background: var(--bg-secondary);
                      border-bottom: 1px solid var(--border-color);
                      padding: 1rem 2rem;
                      position: sticky;
                      top: 0;
                      z-index: 100;
                  }
                  .header-content {
                      max-width: 1200px;
                      margin: 0 auto;
                      display: flex;
                      align-items: center;
                      justify-content: space-between;
                  }
                  .header-logo {
                      display: flex;
                      align-items: center;
                      gap: 0.75rem;
                      color: var(--accent-primary);
                      text-decoration: none;
                      font-size: 1.25rem;
                      font-weight: 700;
                  }
                  .header-nav {
                      display: flex;
                      align-items: center;
                      gap: 1.5rem;
                  }
                  .header-nav a {
                      color: var(--text-secondary);
                      text-decoration: none;
                      font-size: 0.875rem;
                      transition: color 0.2s;
                  }
                  .header-nav a:hover { color: var(--accent-primary); }
                  .main {
                      max-width: 900px;
                      margin: 0 auto;
                      padding: 3rem 2rem;
                  }
                  .content {
                      background: var(--bg-secondary);
                      border-radius: 12px;
                      padding: 2.5rem;
                      border: 1px solid var(--border-color);
                  }
                  .content h1 {
                      color: var(--accent-primary);
                      font-size: 2rem;
                      margin-bottom: 1.5rem;
                      padding-bottom: 0.75rem;
                      border-bottom: 1px solid var(--border-color);
                  }
                  .content h2 {
                      color: var(--text-primary);
                      font-size: 1.5rem;
                      margin-top: 2rem;
                      margin-bottom: 1rem;
                  }
                  .content h3 {
                      color: var(--text-secondary);
                      font-size: 1.125rem;
                      margin-top: 1.5rem;
                      margin-bottom: 0.75rem;
                  }
                  .content h4 {
                      color: var(--text-secondary);
                      font-size: 1rem;
                      margin-top: 1.25rem;
                      margin-bottom: 0.5rem;
                  }
                  .content p { margin-bottom: 1rem; color: var(--text-secondary); }
                  .content ul, .content ol { margin: 1rem 0; padding-left: 1.5rem; }
                  .content li { margin: 0.5rem 0; color: var(--text-secondary); }
                  .content code {
                      background: var(--bg-tertiary);
                      padding: 0.2em 0.4em;
                      border-radius: 4px;
                      font-family: "JetBrains Mono", monospace;
                      font-size: 0.875em;
                      color: var(--accent-primary);
                  }
                  .content pre {
                      background: var(--bg-tertiary);
                      padding: 1rem;
                      border-radius: 8px;
                      overflow-x: auto;
                      margin: 1rem 0;
                  }
                  .content pre code {
                      background: none;
                      padding: 0;
                      color: var(--text-primary);
                  }
                  .content a { color: var(--accent-primary); text-decoration: none; }
                  .content a:hover { text-decoration: underline; }
                  .content table {
                      width: 100%;
                      border-collapse: collapse;
                      margin: 1rem 0;
                  }
                  .content th, .content td {
                      padding: 0.75rem;
                      text-align: left;
                      border-bottom: 1px solid var(--border-color);
                  }
                  .content th {
                      color: var(--accent-primary);
                      font-weight: 600;
                  }
                  .content blockquote {
                      border-left: 3px solid var(--accent-primary);
                      padding-left: 1rem;
                      margin: 1rem 0;
                      color: var(--text-muted);
                  }
                  .back-link {
                      display: inline-flex;
                      align-items: center;
                      gap: 0.5rem;
                      color: var(--text-muted);
                      text-decoration: none;
                      margin-bottom: 1rem;
                      font-size: 0.875rem;
                  }
                  .back-link:hover { color: var(--accent-primary); }
                  .theme-toggle {
                      background: var(--bg-tertiary);
                      border: 1px solid var(--border-color);
                      color: var(--text-secondary);
                      padding: 0.5rem 1rem;
                      border-radius: 6px;
                      cursor: pointer;
                      font-size: 0.875rem;
                  }
                  .theme-toggle:hover { color: var(--accent-primary); }
                  @media (max-width: 768px) {
                      .main { padding: 1.5rem; }
                      .content { padding: 1.5rem; }
                      .header-content { flex-wrap: wrap; gap: 1rem; }
                  }
              </style>
          </head>
          <body>
              <header class="header">
                  <div class="header-content">
                      <a href="/bitcal/" class="header-logo">
                          <i class="fas fa-microchip"></i>
                          <span>BitCal</span>
                      </a>
                      <nav class="header-nav">
                          <a href="/bitcal/docs/">Documentation</a>
                          <a href="/bitcal/">Home</a>
                          <a href="https://github.com/LessUp/bitcal" target="_blank">
                              <i class="fab fa-github"></i> GitHub
                          </a>
                      </nav>
                      <button class="theme-toggle" onclick="toggleTheme()">
                          <i class="fas fa-sun" id="theme-icon"></i>
                      </button>
                  </div>
              </header>
              <main class="main">
                  <a href="/bitcal/docs/" class="back-link"><i class="fas fa-arrow-left"></i> Back to Documentation</a>
                  <article class="content">
          CONTENT
                      </article>
              </main>
              <script>
                  function toggleTheme() {
                      const html = document.documentElement;
                      const icon = document.getElementById("theme-icon");
                      const current = html.getAttribute("data-theme");
                      const next = current === "dark" ? "light" : "dark";
                      html.setAttribute("data-theme", next);
                      localStorage.setItem("bitcal-theme", next);
                      icon.className = next === "dark" ? "fas fa-sun" : "fas fa-moon";
                  }
                  const saved = localStorage.getItem("bitcal-theme") || "dark";
                  document.documentElement.setAttribute("data-theme", saved);
                  document.getElementById("theme-icon").className = saved === "dark" ? "fas fa-sun" : "fas fa-moon";
              </script>
              <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
              <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/cpp.min.js"></script>
              <script>hljs.highlightAll();</script>
          </body>
          </html>'

          find _site/docs -name "*.md" | while read file; do
            html_file="${file%.md}.html"
            dir=$(dirname "$file")
            basename=$(basename "$file" .md)
            
            title="$basename"
            lang="en"
            if [[ "$file" == *"/zh/"* ]]; then
              lang="zh"
            fi
            
            content=$(marked "$file" 2>/dev/null)
            
            echo "$HTML_TEMPLATE" | sed \
              -e "s|LANG|$lang|g" \
              -e "s|TITLE|$title|g" \
              -e "s|CONTENT|$content|g" > "$html_file"
            
            echo "Converted: $file -> $html_file"
          done

          cp README.md _site/ 2>/dev/null || true
          cp README.zh-CN.md _site/ 2>/dev/null || true
          cp CHANGELOG.md _site/ 2>/dev/null || true
          cp CHANGELOG.zh-CN.md _site/ 2>/dev/null || true
          cp LICENSE _site/ 2>/dev/null || true
          
          echo "=== _site structure ==="
          find _site -type f -name "*.html" | head -50
          
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
