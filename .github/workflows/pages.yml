name: Deploy to GitHub Pages

on:
  push:
    branches: [master, main]
    paths:
      - "index.html"
      - "404.html"
      - "docs/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        
      - name: Setup Pages
        uses: actions/configure-pages@v5
      
      - name: Build Site
        run: |
          mkdir -p _site
          touch _site/.nojekyll

          # Copy static files
          cp index.html _site/
          cp 404.html _site/
          
          # Copy docs (HTML files now pre-built)
          cp -r docs _site/
          
          # Verify structure
          echo "=== Site Structure ==="
          find _site -name "*.html" | head -30
          echo ""
          echo "Total HTML files:"
          find _site -name "*.html" | wc -l
          
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
