name: Deploy to GitHub Pages

on:
  push:
    branches: [master, main]
    paths:
      - "index.html"
      - "404.html"
      - "docs/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        
      - name: Setup Pages
        uses: actions/configure-pages@v5
        
      - name: Build Site Structure
        run: |
          # Create _site directory
          mkdir -p _site

          # Prevent Jekyll from processing the site
          touch _site/.nojekyll

          # Copy main site files
          cp index.html _site/
          cp 404.html _site/
          cp -r docs _site/
          
          # Copy other important files
          cp README.md _site/ 2>/dev/null || true
          cp README.zh-CN.md _site/ 2>/dev/null || true
          cp CHANGELOG.md _site/ 2>/dev/null || true
          cp CHANGELOG.zh-CN.md _site/ 2>/dev/null || true
          cp LICENSE _site/ 2>/dev/null || true
          
          # List structure for debugging
          echo "=== _site structure ==="
          find _site -type f | head -50
          
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
