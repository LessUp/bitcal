name: Deploy to GitHub Pages

on:
  push:
    branches: [master, main]
    paths:
      - "index.html"
      - "404.html"
      - "docs/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        
      - name: Setup Pages
        uses: actions/configure-pages@v5
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install markdown-to-html converter
        run: npm install -g marked
      
      - name: Build Site Structure
        run: |
          # Create _site directory
          mkdir -p _site

          # Prevent Jekyll from processing the site
          touch _site/.nojekyll

          # Copy main site files
          cp index.html _site/
          cp 404.html _site/
          
          # Copy docs and convert markdown to html
          cp -r docs _site/
          
          # Convert all .md files to .html
          find _site/docs -name "*.md" | while read file; do
            html_file="${file%.md}.html"
            
            # Create a simple HTML wrapper with the markdown content
            cat > "$html_file" << 'HTMLHEAD'
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BitCal Documentation</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-tertiary: #1a1a25;
            --text-primary: #e6e6e6;
            --text-secondary: #a0a0b0;
            --text-muted: #6a6a7a;
            --accent-primary: #00d4ff;
            --accent-secondary: #ff006e;
            --border-color: rgba(255,255,255,0.1);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.7;
        }
        .header {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            padding: 1rem 2rem;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .header-logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            color: var(--accent-primary);
            text-decoration: none;
            font-size: 1.25rem;
            font-weight: 700;
        }
        .header-nav {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }
        .header-nav a {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.875rem;
            transition: color 0.2s;
        }
        .header-nav a:hover {
            color: var(--accent-primary);
        }
        .main {
            max-width: 900px;
            margin: 0 auto;
            padding: 3rem 2rem;
        }
        .content {
            background: var(--bg-secondary);
            border-radius: 12px;
            padding: 2.5rem;
            border: 1px solid var(--border-color);
        }
        .content h1 {
            color: var(--accent-primary);
            font-size: 2rem;
            margin-bottom: 1.5rem;
            padding-bottom: 0.75rem;
            border-bottom: 1px solid var(--border-color);
        }
        .content h2 {
            color: var(--text-primary);
            font-size: 1.5rem;
            margin-top: 2rem;
            margin-bottom: 1rem;
        }
        .content h3 {
            color: var(--text-secondary);
            font-size: 1.125rem;
            margin-top: 1.5rem;
            margin-bottom: 0.75rem;
        }
        .content p { margin-bottom: 1rem; color: var(--text-secondary); }
        .content ul, .content ol { margin: 1rem 0; padding-left: 1.5rem; }
        .content li { margin: 0.5rem 0; color: var(--text-secondary); }
        .content code {
            background: var(--bg-tertiary);
            padding: 0.2em 0.4em;
            border-radius: 4px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.875em;
            color: var(--accent-primary);
        }
        .content pre {
            background: var(--bg-tertiary);
            padding: 1rem;
            border-radius: 8px;
            overflow-x: auto;
            margin: 1rem 0;
        }
        .content pre code {
            background: none;
            padding: 0;
            color: var(--text-primary);
        }
        .content a { color: var(--accent-primary); text-decoration: none; }
        .content a:hover { text-decoration: underline; }
        .content table {
            width: 100%;
            border-collapse: collapse;
            margin: 1rem 0;
        }
        .content th, .content td {
            padding: 0.75rem;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
        }
        .content th {
            color: var(--accent-primary);
            font-weight: 600;
        }
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-muted);
            text-decoration: none;
            margin-bottom: 1rem;
            font-size: 0.875rem;
        }
        .back-link:hover { color: var(--accent-primary); }
        @media (max-width: 768px) {
            .main { padding: 1.5rem; }
            .content { padding: 1.5rem; }
            .header-content { flex-wrap: wrap; gap: 1rem; }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-content">
            <a href="/bitcal/" class="header-logo">
                <i class="fas fa-microchip"></i>
                <span>BitCal</span>
            </a>
            <nav class="header-nav">
                <a href="/bitcal/docs/">Documentation</a>
                <a href="/bitcal/" style="color: var(--accent-primary);">Home</a>
                <a href="https://github.com/LessUp/bitcal" target="_blank">
                    <i class="fab fa-github"></i>
                </a>
            </nav>
        </div>
    </header>
    <main class="main">
        <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to Documentation</a>
        <article class="content">
HTMLHEAD
            
            # Convert markdown to HTML and append
            marked "$file" >> "$html_file"
            
            # Close the HTML
            cat >> "$html_file" << 'HTMLFOOT'
        </article>
    </main>
</body>
</html>
HTMLFOOT
            
            echo "Converted: $file -> $html_file"
          done
          
          # Copy other important files
          cp README.md _site/ 2>/dev/null || true
          cp README.zh-CN.md _site/ 2>/dev/null || true
          cp CHANGELOG.md _site/ 2>/dev/null || true
          cp CHANGELOG.zh-CN.md _site/ 2>/dev/null || true
          cp LICENSE _site/ 2>/dev/null || true
          
          # List structure for debugging
          echo "=== _site structure ==="
          find _site -type f | head -100
          
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
