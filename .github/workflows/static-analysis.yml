name: Static Analysis

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

permissions:
  contents: read
  # Required for cpp-linter to post annotations
  checks: write

concurrency:
  group: static-analysis-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  clang-tidy:
    name: "clang-tidy"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install clang-tidy
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-tidy

      - name: Create compile_commands.json
        run: |
          cmake -S . -B build \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            -DBITCAL_BUILD_TESTS=ON \
            -DBITCAL_NATIVE_ARCH=OFF

      - name: Run clang-tidy
        run: |
          clang-tidy -p build \
            --checks='-*,performance-*,portability-*,bugprone-*,cert-*,cppcoreguidelines-*' \
            include/bitcal/*.hpp \
            tests/*.cpp \
            2>&1 | tee clang-tidy-report.txt

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: clang-tidy-report
          path: clang-tidy-report.txt

  cppcheck:
    name: "cppcheck"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install cppcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y cppcheck

      - name: Run cppcheck
        run: |
          cppcheck --enable=all \
            --suppress=missingIncludeSystem \
            --suppress=unusedFunction \
            --suppress=preprocessorErrorDirective \
            --error-exitcode=0 \
            --inline-suppr \
            --std=c++17 \
            -I include \
            include/bitcal/ tests/ \
            2>&1 | tee cppcheck-report.txt

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: cppcheck-report
          path: cppcheck-report.txt
