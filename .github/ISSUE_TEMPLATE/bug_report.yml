name: Bug Report
description: Report a bug in BitCal
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug!
  
  - type: input
    id: version
    attributes:
      label: BitCal Version
      placeholder: e.g., 2.1.0
    validations:
      required: true
  
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - Linux x86-64
        - Linux ARM64
        - macOS x86-64
        - macOS ARM64 (Apple Silicon)
        - Windows x86-64
        - Other
    validations:
      required: true
  
  - type: input
    id: compiler
    attributes:
      label: Compiler
      placeholder: e.g., GCC 13.2, Clang 17, MSVC 2022
    validations:
      required: true
  
  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: Clear description of the bug
    validations:
      required: true
  
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction Steps
      description: Minimal code to reproduce the issue
      render: cpp
    validations:
      required: true
  
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
  
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true
